<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      color: #222;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
    }
    .topbar h1 { font-size: 1.1em; margin: 0; }
    #signInMessage { text-align: center; margin-top: 100px; color: #666; }
    #app { flex: 1; min-height: 0; }

    .chat-layout { display: flex; height: 100%; }

    .sidebar {
      width: 260px;
      flex-shrink: 0;
      border-right: 1px solid #ddd;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .new-chat-btn {
      margin: 12px;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      background: #fff;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9em;
    }
    .new-chat-btn:hover { background: #f5f5f5; }
    .conversation-list { list-style: none; margin: 0; padding: 0 8px 12px; flex: 1; overflow-y: auto; }
    .conversation-item {
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 4px;
      font-size: 0.88em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .conversation-item:hover { background: #f0f0f0; }
    .conversation-item.active { background: #e6e6e6; font-weight: 600; }

    .chat-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .error-banner { background: #fde2e1; color: #8a1f1f; padding: 8px 20px; font-size: 0.85em; flex-shrink: 0; }
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .message {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      font-size: 0.95em;
    }
    .message.user { align-self: flex-end; background: #2563eb; color: #fff; }
    .message.assistant { align-self: flex-start; background: #f1f1f1; color: #222; }
    .message.approval { align-self: center; background: #fff3cd; color: #664d03; font-size: 0.85em; }
    .empty-state { margin: auto; color: #888; text-align: center; }

    .approval-card {
      align-self: stretch;
      border: 1px solid #f0c36d;
      background: #fff8e6;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.88em;
    }
    .approval-card .approval-title { font-weight: 700; margin-bottom: 6px; }
    .approval-card .approval-tool { font-family: monospace; background: #fff2cc; padding: 1px 6px; border-radius: 4px; }
    .approval-card pre.approval-input {
      background: #fffdf7;
      border: 1px solid #eee0b8;
      border-radius: 6px;
      padding: 8px 10px;
      margin: 8px 0;
      font-size: 0.85em;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .approval-card .approval-actions { display: flex; gap: 8px; margin-top: 8px; }
    .approval-card button {
      padding: 6px 16px;
      border-radius: 6px;
      border: 1px solid transparent;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9em;
    }
    .approval-card button:disabled { opacity: 0.5; cursor: default; }
    .approval-card .approve-btn { background: #16a34a; color: #fff; }
    .approval-card .deny-btn { background: #fff; color: #b42318; border-color: #b42318; }

    .composer { display: flex; gap: 8px; padding: 14px 20px; border-top: 1px solid #ddd; flex-shrink: 0; }
    .composer textarea {
      flex: 1;
      resize: none;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 0.95em;
      font-family: inherit;
    }
    .composer button {
      padding: 0 20px;
      border-radius: 8px;
      border: none;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
      font-weight: 600;
    }
    .composer button:disabled { background: #aaa; cursor: default; }
  </style>
</head>
<body>
  <header class="topbar">
    <h1>AI Chat</h1>
    <div id="menu-bar"></div>
  </header>
  <p id="signInMessage">サインインしてチャットを始めましょう。</p>
  <div id="app"></div>
  <script type="module" src="/src/index.ts"></script>
</body>
</html>
